<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>NotifCar – Signaler un véhicule</title>
  <meta name="description" content="Signalez un problème au propriétaire de ce véhicule via NotifCar.">
  <link rel="icon" href="https://lifmyjdygwakmimjgkef.supabase.co/storage/v1/object/public/alert-images/notifcar-app-icon.jpg">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue:     #285AFF;
      --blue-dk:  #1a46d4;
      --teal:     #32C8C8;
      --red:      #EF4444;
      --amber:    #F59E0B;
      --indigo:   #6366F1;
      --bg:       #F1F5F9;
      --card:     #FFFFFF;
      --border:   #E2E8F0;
      --text:     #0F172A;
      --text2:    #475569;
      --text3:    #94A3B8;
      --input-bg: #F8FAFC;
      --radius:   20px;
      --shadow:   0 2px 8px rgba(15,23,42,0.07);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(150deg, #285AFF 0%, #1a3fd4 60%, #5000FF 100%);
      padding: 52px 24px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 180% 120% at 70% 10%, rgba(255,255,255,0.12) 0%, transparent 60%);
    }
    .header-logo {
      width: 76px; height: 76px;
      border-radius: 22px;
      object-fit: cover;
      margin: 0 auto 16px;
      display: block;
      border: 2px solid rgba(255,255,255,0.25);
      box-shadow: 0 12px 32px rgba(0,0,0,0.25);
      position: relative;
    }
    .header h1 {
      font-size: 28px; font-weight: 800; color: #fff;
      letter-spacing: -0.6px; margin-bottom: 6px; position: relative;
    }
    .header-sub {
      font-size: 14px; color: rgba(255,255,255,0.72);
      font-weight: 500; position: relative;
    }

    /* ── Page body ── */
    .page-body {
      max-width: 540px;
      margin: 0 auto;
      padding: 20px 14px 90px;
    }

    /* ── Store strip ── */
    .store-strip { display: flex; gap: 8px; margin-bottom: 14px; }
    .store-btn {
      flex: 1; display: flex; align-items: center; justify-content: center;
      gap: 7px; padding: 11px 12px;
      border-radius: 14px;
      background: var(--card); border: 1.5px solid var(--border);
      text-decoration: none; font-size: 13px; font-weight: 700; color: var(--text);
      box-shadow: var(--shadow);
      transition: transform .14s, box-shadow .14s;
    }
    .store-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(15,23,42,0.1); }
    .store-btn-icon { font-size: 19px; }
    .store-btn-open {
      background: var(--blue); border-color: var(--blue); color: #fff;
      box-shadow: 0 4px 16px rgba(40,90,255,0.35);
    }
    .store-btn-open:hover { box-shadow: 0 6px 20px rgba(40,90,255,0.45); }

    /* ── Section label ── */
    .section-label {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
    }
    .section-label-icon {
      width: 32px; height: 32px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .section-label-text {
      font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.2px;
    }
    .section-label-optional {
      font-size: 13px; font-weight: 400; color: var(--text3); margin-left: 4px;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 18px 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
    }

    /* ── Reason grid 2×2 ── */
    .reason-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .reason-card {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; padding: 16px 10px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      cursor: pointer;
      background: var(--input-bg);
      transition: border-color .14s, background .14s, transform .1s;
      user-select: none; text-align: center;
    }
    .reason-card:hover { border-color: var(--blue); background: #EFF6FF; transform: translateY(-1px); }
    .reason-card.sel-blue   { background: var(--blue);   border-color: var(--blue);   color: #fff; }
    .reason-card.sel-red    { background: var(--red);    border-color: var(--red);    color: #fff; }
    .reason-card.sel-amber  { background: var(--amber);  border-color: var(--amber);  color: #fff; }
    .reason-card.sel-indigo { background: var(--indigo); border-color: var(--indigo); color: #fff; }
    .reason-card-icon {
      width: 44px; height: 44px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .reason-card:not([class*="sel-"]) .reason-card-icon { background: #fff; box-shadow: 0 1px 4px rgba(15,23,42,0.08); }
    .reason-card[class*="sel-"]      .reason-card-icon  { background: rgba(255,255,255,0.2); }
    .reason-card-text { font-size: 13px; font-weight: 600; line-height: 1.3; }
    .reason-card-full { grid-column: span 2; flex-direction: row; padding: 13px 14px; }
    .reason-card-full .reason-card-icon { width: 36px; height: 36px; border-radius: 10px; font-size: 18px; }

    .custom-input {
      width: 100%; padding: 13px 14px;
      border: 1.5px solid var(--border); border-radius: 12px;
      font-size: 15px; font-family: inherit;
      background: var(--input-bg); color: var(--text);
      transition: border-color .14s; margin-top: 10px; display: none;
    }
    .custom-input:focus { outline: none; border-color: var(--blue); background: #fff; }

    /* ── Urgency pills ── */
    .urgency-row { display: flex; gap: 8px; }
    .urgency-pill {
      flex: 1; display: flex; align-items: center; justify-content: center;
      gap: 7px; padding: 12px 8px;
      border: 1.5px solid var(--border); border-radius: 12px;
      cursor: pointer; background: var(--input-bg);
      transition: border-color .14s, background .14s;
      user-select: none;
    }
    .urgency-pill:hover { border-color: var(--blue); background: #EFF6FF; }
    .urgency-pill.selected { border-color: var(--blue); background: var(--blue); color: #fff; }
    .urgency-pill-emoji { font-size: 18px; }
    .urgency-pill-text  { font-size: 13px; font-weight: 700; }

    /* ── Textarea ── */
    .text-area {
      width: 100%; padding: 13px 14px;
      border: 1.5px solid var(--border); border-radius: 12px;
      font-size: 15px; font-family: inherit; line-height: 1.5;
      background: var(--input-bg); color: var(--text);
      transition: border-color .14s;
      min-height: 90px; resize: vertical;
    }
    .text-area:focus { outline: none; border-color: var(--blue); background: #fff; }
    .char-count { text-align: right; margin-top: 6px; font-size: 12px; color: var(--text3); }

    /* ── Action bar ── */
    .action-bar { display: flex; gap: 10px; margin-top: 4px; }
    .btn {
      flex: 1; padding: 15px 20px;
      border: none; border-radius: 14px;
      font-weight: 700; font-size: 15px; font-family: inherit;
      cursor: pointer;
      transition: opacity .14s, transform .14s, box-shadow .14s;
    }
    .btn-primary {
      background: var(--blue); color: #fff;
      box-shadow: 0 4px 16px rgba(40,90,255,0.35);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(40,90,255,0.45); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-ghost {
      background: var(--input-bg); color: var(--text2);
      border: 1.5px solid var(--border); flex: 0 0 auto; padding: 15px 18px;
    }
    .btn-ghost:hover { background: var(--border); }

    /* ── Error ── */
    .error-box {
      display: none; align-items: flex-start; gap: 10px;
      background: #FEF2F2; border: 1px solid #FECACA; color: #B91C1C;
      padding: 13px 14px; border-radius: 12px;
      margin-top: 10px; font-size: 14px; font-weight: 500;
    }
    .error-box.show { display: flex; }

    /* ── Loading ── */
    .loading-wrap { display: none; text-align: center; padding: 14px 0; }
    .loading-wrap.show { display: block; }
    .spinner {
      width: 26px; height: 26px;
      border: 3px solid var(--border); border-top-color: var(--blue);
      border-radius: 50%; animation: spin .7s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--text2); font-weight: 500; }

    /* ── Success ── */
    .success-wrap { display: none; text-align: center; padding: 44px 20px; }
    .success-wrap.show { display: block; }
    .success-icon {
      width: 76px; height: 76px; border-radius: 50%;
      background: #DCFCE7;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; margin: 0 auto 20px;
    }
    .success-title { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 8px; letter-spacing: -0.4px; }
    .success-sub   { font-size: 15px; color: var(--text2); line-height: 1.6; }
    .success-checks { margin-top: 28px; }
    .success-check-row {
      display: flex; align-items: center; gap: 10px;
      background: #F0FDF4; border: 1px solid #BBF7D0;
      border-radius: 12px; padding: 12px 14px;
      margin-bottom: 8px; font-size: 14px; color: #15803D; font-weight: 500;
    }

    /* ── Invalid ── */
    .invalid-wrap { text-align: center; padding: 40px 20px; }
    .invalid-icon { font-size: 52px; margin-bottom: 18px; }
    .invalid-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .invalid-sub   { font-size: 14px; color: var(--text2); line-height: 1.65; }

    @media (max-width: 360px) {
      .reason-grid { grid-template-columns: 1fr; }
      .reason-card-full { grid-column: span 1; }
    }
  </style>
</head>
<body>

  <div class="header">
    <img class="header-logo"
      src="https://lifmyjdygwakmimjgkef.supabase.co/storage/v1/object/public/alert-images/notifcar-app-icon.jpg"
      alt="NotifCar" onerror="this.style.display='none'"/>
    <h1>NotifCar</h1>
    <p class="header-sub">Signalement de véhicule</p>
  </div>

  <div class="page-body" id="pageBody">
    <!-- Contenu injecté par JS selon les params URL -->
  </div>

  <script>
    const SUPABASE_URL    = 'https://lifmyjdygwakmimjgkef.supabase.co';
    const SUPABASE_ANON   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxpZm15amR5Z3dha21pbWpna2VmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTY5MzQ5NzAsImV4cCI6MjA3MjUxMDk3MH0.o9msOeNxdpq4zQNwX2D9W_OjJw-7gsOFB8H7q3Lla8g';
    const APP_STORE_URL   = 'https://apps.apple.com/app/notifcar';
    const PLAY_STORE_URL  = 'https://play.google.com/store/apps/details?id=com.notifcar.monapp';

    // Lire les paramètres URL
    const params    = new URLSearchParams(window.location.search);
    const vehicleId = params.get('vehicleId') || '';
    const ownerId   = params.get('ownerId')   || '';

    const isIOS     = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    const isAndroid = /Android/i.test(navigator.userAgent);
    const isMobile  = isIOS || isAndroid;
    const deepLink  = vehicleId && ownerId
      ? `notifcar://scan?vehicleId=${encodeURIComponent(vehicleId)}&ownerId=${encodeURIComponent(ownerId)}`
      : '';

    const body = document.getElementById('pageBody');

    if (!vehicleId || !ownerId) {
      body.innerHTML = `
        <div class="card invalid-wrap">
          <div class="invalid-icon">⚠️</div>
          <div class="invalid-title">QR code invalide</div>
          <div class="invalid-sub">Impossible de charger le formulaire.<br>Veuillez scanner un QR code NotifCar valide.</div>
        </div>`;
    } else {
      body.innerHTML = `
        <!-- Store strip -->
        <div class="store-strip">
          ${isMobile && deepLink ? `<a href="${deepLink}" class="store-btn store-btn-open"><span class="store-btn-icon">🚀</span> Ouvrir l'app</a>` : ''}
          ${isIOS    ? `<a href="${APP_STORE_URL}"  class="store-btn"><span class="store-btn-icon">🍎</span> App Store</a>`   : ''}
          ${isAndroid? `<a href="${PLAY_STORE_URL}" class="store-btn"><span class="store-btn-icon">▶</span> Google Play</a>` : ''}
          ${!isMobile? `<a href="${APP_STORE_URL}"  class="store-btn"><span class="store-btn-icon">🍎</span> App Store</a><a href="${PLAY_STORE_URL}" class="store-btn"><span class="store-btn-icon">▶</span> Google Play</a>` : ''}
        </div>

        <div id="formWrapper">
          <form id="signalForm">

            <!-- Raison -->
            <div class="card">
              <div class="section-label">
                <div class="section-label-icon" style="background:#FEE2E2;">🚨</div>
                <span class="section-label-text">Raison du scan</span>
              </div>
              <div class="reason-grid">
                <div class="reason-card" data-reason="stationnement_genant" data-sel="sel-blue">
                  <div class="reason-card-icon">🚗</div>
                  <span class="reason-card-text">Stationnement gênant</span>
                </div>
                <div class="reason-card" data-reason="degradation" data-sel="sel-red">
                  <div class="reason-card-icon">🔨</div>
                  <span class="reason-card-text">Dégradation</span>
                </div>
                <div class="reason-card" data-reason="oubli" data-sel="sel-amber">
                  <div class="reason-card-icon">⚠️</div>
                  <span class="reason-card-text">Oubli (feu, objet…)</span>
                </div>
                <div class="reason-card" data-reason="accident" data-sel="sel-red">
                  <div class="reason-card-icon">🚨</div>
                  <span class="reason-card-text">Accident</span>
                </div>
                <div class="reason-card reason-card-full" data-reason="autre" data-sel="sel-indigo">
                  <div class="reason-card-icon">···</div>
                  <span class="reason-card-text">Autre</span>
                </div>
              </div>
              <input type="text" id="customReason" class="custom-input" placeholder="Précisez votre raison…">
            </div>

            <!-- Description -->
            <div class="card">
              <div class="section-label">
                <div class="section-label-icon" style="background:#DCFCE7;">📝</div>
                <span class="section-label-text">Description</span>
              </div>
              <textarea id="vehicleIssue" class="text-area" placeholder="Décrivez ce que vous observez (ex : phares allumés, porte ouverte, dégâts visibles…)"></textarea>
            </div>

            <!-- Urgence -->
            <div class="card">
              <div class="section-label">
                <div class="section-label-icon" style="background:#FEF3C7;">⚡</div>
                <span class="section-label-text">Niveau d'urgence</span>
              </div>
              <div class="urgency-row">
                <div class="urgency-pill" data-urgency="urgent"><span class="urgency-pill-emoji">🔴</span><span class="urgency-pill-text">Urgent</span></div>
                <div class="urgency-pill" data-urgency="important"><span class="urgency-pill-emoji">🟡</span><span class="urgency-pill-text">Important</span></div>
                <div class="urgency-pill selected" data-urgency="normal"><span class="urgency-pill-emoji">🟢</span><span class="urgency-pill-text">Normal</span></div>
              </div>
            </div>

            <!-- Message -->
            <div class="card">
              <div class="section-label">
                <div class="section-label-icon" style="background:#E0E7FF;">💬</div>
                <span class="section-label-text">Message <span class="section-label-optional">· optionnel</span></span>
              </div>
              <textarea id="customMessage" class="text-area" placeholder="Ajoutez des détails supplémentaires…" maxlength="500"></textarea>
              <div class="char-count"><span id="charCount">0</span> / 500</div>
            </div>

            <div class="error-box" id="errorBox"><span>⚠️</span><span id="errorText"></span></div>
            <div class="loading-wrap" id="loading"><div class="spinner"></div><div class="loading-text">Envoi de l'alerte en cours…</div></div>

            <div class="action-bar">
              <button type="button" class="btn btn-ghost" id="cancelBtn">Annuler</button>
              <button type="submit" class="btn btn-primary" id="submitBtn">Envoyer l'alerte 🚀</button>
            </div>
          </form>
        </div>

        <div class="card success-wrap" id="successMessage">
          <div class="success-icon">✅</div>
          <div class="success-title">Alerte envoyée !</div>
          <div class="success-sub">Le propriétaire du véhicule a été notifié.<br>Merci pour votre signalement.</div>
          <div class="success-checks">
            <div class="success-check-row">✅ Notification push envoyée</div>
            <div class="success-check-row">💬 Message transmis au propriétaire</div>
          </div>
        </div>`;

      initForm();
    }

    function initForm() {
      let selectedReason  = '';
      let selectedUrgency = 'normal';

      // Raisons
      document.querySelectorAll('.reason-card').forEach(card => {
        card.addEventListener('click', () => {
          document.querySelectorAll('.reason-card').forEach(c => {
            c.className = c.className.replace(/\bsel-\w+\b/g, '').trim();
          });
          card.classList.add(card.dataset.sel);
          selectedReason = card.dataset.reason;
          const ci = document.getElementById('customReason');
          ci.style.display = selectedReason === 'autre' ? 'block' : 'none';
          if (selectedReason !== 'autre') ci.value = '';
        });
      });

      // Urgence
      document.querySelectorAll('.urgency-pill').forEach(pill => {
        pill.addEventListener('click', () => {
          document.querySelectorAll('.urgency-pill').forEach(p => p.classList.remove('selected'));
          pill.classList.add('selected');
          selectedUrgency = pill.dataset.urgency;
        });
      });

      // Compteur
      const cm = document.getElementById('customMessage');
      const cc = document.getElementById('charCount');
      if (cm) cm.addEventListener('input', () => { cc.textContent = cm.value.length; });

      // Soumission
      document.getElementById('signalForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!selectedReason) { showError('Veuillez sélectionner une raison.'); return; }

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        document.getElementById('loading').classList.add('show');
        hideError();

        const payload = {
          vehicleId, ownerId,
          reasonType:    selectedReason,
          customReason:  selectedReason === 'autre' ? document.getElementById('customReason').value : null,
          vehicleIssue:  document.getElementById('vehicleIssue').value,
          urgencyLevel:  selectedUrgency,
          customMessage: cm ? cm.value : '',
        };

        try {
          const res = await fetch(`${SUPABASE_URL}/functions/v1/qr-scan-submit`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'apikey': SUPABASE_ANON,
              'Authorization': `Bearer ${SUPABASE_ANON}`,
            },
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          if (res.ok) {
            document.getElementById('formWrapper').style.display = 'none';
            document.getElementById('successMessage').classList.add('show');
          } else {
            showError(data.error || 'Une erreur est survenue. Veuillez réessayer.');
            submitBtn.disabled = false;
          }
        } catch {
          showError('Erreur de connexion. Vérifiez votre connexion internet.');
          submitBtn.disabled = false;
        } finally {
          document.getElementById('loading').classList.remove('show');
        }
      });

      document.getElementById('cancelBtn').addEventListener('click', () => {
        if (confirm('Annuler ? Votre alerte ne sera pas envoyée.')) {
          window.location.href = 'https://notifcar.fr';
        }
      });
    }

    function showError(msg) {
      document.getElementById('errorText').textContent = msg;
      document.getElementById('errorBox').classList.add('show');
    }
    function hideError() {
      document.getElementById('errorBox').classList.remove('show');
    }
  </script>
</body>
</html>
